# Si el servicio API se construye con Nixpacks/Railpack (sin Dockerfile), el arranque por defecto
# suele ser `uvicorn app.main:app` escuchando en 127.0.0.1:8000 → el healthcheck y el edge
# no pueden conectar. Este [start] sustituye el plan generado.
#
# Uso: en Railway, Root directory = `apps/quantum-api` O monorepo root si Nixpacks lee esto
# (según cómo se resuelva el contexto de build; lo más fiable es Dockerfile en la raíz del repo).
[start]
cmd = "sh -c 'exec python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
